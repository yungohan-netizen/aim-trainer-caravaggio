<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIM TRAINER — V3</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; overflow: hidden;
            background: #050505;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }

        /* ─── HUD ─── */
        .hud-container {
            position: absolute;
            pointer-events: none; z-index: 10;
            text-shadow: 0 4px 8px rgba(0,0,0,0.9);
        }
        .hud-label { font-size: 11px; color: #444; letter-spacing: 3px; margin-bottom: -4px; }
        .hud-value { font-size: 44px; font-weight: 800; color: #fff; }
        #hud-left   { top: 28px; left: 36px; }
        #hud-right  { top: 28px; right: 36px; text-align: right; }
        #hud-center { top: 18px; left: 50%; transform: translateX(-50%); text-align: center; }
        #hud-combo  { bottom: 28px; left: 50%; transform: translateX(-50%); text-align: center; }

        #timeDisplay { font-size: 38px; font-weight: 800; color: #fff; transition: color 0.3s; }
        #livesBox {
            margin-top: 4px; font-size: 20px; color: #ff3333;
            letter-spacing: 3px; display: flex; flex-wrap: wrap; justify-content: center;
        }
        .heart.empty { color: #1e1e1e; text-shadow: none; }
        #levelDisplay { color: #00ffff; text-shadow: 0 0 18px rgba(0,255,255,0.5); }

/* ─── LEVEL TIMER BAR ─── */
        #timer-bar-wrap {
            width: 120px; height: 3px; background: #111; border-radius: 2px;
            margin: 5px auto 0; overflow: hidden;
        }
        #timer-bar-fill {
            height: 100%; border-radius: 2px; width: 100%;
            background: #00ffff; transition: background 0.3s;
        }

        /* ─── COMBO ─── */
        #comboValue {
            font-size: 44px; font-weight: 800; color: #444;
            transition: color 0.1s, font-size 0.1s; line-height: 1;
        }
        #comboValue.active { text-shadow: 0 0 20px currentColor; }

        /* ─── CROSSHAIR ─── */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            pointer-events: none; z-index: 10;
            transform: translate(-50%,-50%);
            transition: transform 0.04s, opacity 0.04s;
        }
        #crosshair svg { display: block; }
        #crosshair.hit  { transform: translate(-50%,-50%) scale(1.6); }
        #crosshair.miss { transform: translate(-50%,-50%) scale(0.7); opacity: 0.5; }

        /* ─── OVERLAYS ─── */
        #damageOverlay, #levelUpOverlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 5;
        }
        #damageOverlay  { box-shadow: inset 0 0 200px rgba(255,0,0,0);     transition: box-shadow 0.35s ease-out; }
        #levelUpOverlay { box-shadow: inset 0 0 200px rgba(0,255,255,0);   transition: box-shadow 0.5s ease-out; }

        /* ─── SCORE POPUPS ─── */
        .score-popup {
            position: absolute; pointer-events: none;
            font-family: 'Orbitron', sans-serif; font-weight: 800; font-size: 22px;
            text-shadow: 0 2px 10px rgba(0,0,0,1);
            animation: popupFly 0.8s ease-out forwards;
            z-index: 20; white-space: nowrap; transform: translateX(-50%);
        }
        @keyframes popupFly {
            0%   { opacity: 1; transform: translateX(-50%) translateY(0) scale(0.7); }
            12%  { opacity: 1; transform: translateX(-50%) translateY(-12px) scale(1.15); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-100px) scale(1); }
        }

        /* ─── STREAK BANNER ─── */
        #streak-banner {
            position: absolute; top: 38%; left: 50%;
            transform: translate(-50%,-50%); pointer-events: none; z-index: 15;
            font-size: 52px; font-weight: 800; text-align: center;
            letter-spacing: 5px; opacity: 0;
        }
        @keyframes streakPop {
            0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4) skewX(-8deg); filter: blur(10px); }
            18%  { opacity: 1; transform: translate(-50%,-50%) scale(1.12) skewX(0); filter: blur(0); }
            70%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%,-56%) scale(0.92); }
        }
        .streak-fire    { color: #ff8800; text-shadow: 0 0 30px rgba(255,136,0,0.9), 0 0 60px rgba(255,136,0,0.4); }
        .streak-zap     { color: #ffff00; text-shadow: 0 0 30px rgba(255,255,0,0.9), 0 0 60px rgba(255,255,0,0.4); }
        .streak-godlike { color: #cc44ff; text-shadow: 0 0 30px rgba(200,68,255,0.9), 0 0 60px rgba(200,68,255,0.4); }
        .streak-insane  { color: #00ffff; text-shadow: 0 0 40px rgba(0,255,255,1),    0 0 80px rgba(0,255,255,0.5); }

        /* ─── LEVEL BANNER ─── */
        #level-up-banner {
            position: absolute; top: 25%; left: 50%;
            transform: translate(-50%,-50%); pointer-events: none; z-index: 16;
            text-align: center; opacity: 0; font-size: 22px;
            letter-spacing: 6px; color: #00ffff;
            text-shadow: 0 0 20px rgba(0,255,255,0.9);
        }
        @keyframes levelBanner {
            0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.8); }
            15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
            75%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%,-55%); }
        }
        @keyframes levelUpPulse {
            0%   { transform: scale(1); }
            50%  { transform: scale(1.5); color: #fff; text-shadow: 0 0 40px #fff; }
            100% { transform: scale(1); }
        }
        .level-up-anim { animation: levelUpPulse 0.7s ease-out; }

        /* ─── BOMB WARNING ─── */
        #bomb-warning {
            position: absolute; bottom: 90px; left: 50%;
            transform: translateX(-50%); pointer-events: none; z-index: 15;
            font-size: 12px; letter-spacing: 4px; color: #ff3333;
            opacity: 0; transition: opacity 0.25s;
            text-shadow: 0 0 10px rgba(255,51,51,0.6);
        }

        /* ─── BOMB LABELS ─── */
        .bomb-label {
            position: absolute; pointer-events: none; z-index: 12;
            font-size: 11px; font-weight: 800; letter-spacing: 3px;
            color: #ff3333; text-shadow: 0 0 8px rgba(255,51,51,0.8);
            transform: translateX(-50%);
            animation: bombLabelBlink 0.6s ease-in-out infinite;
        }
        @keyframes bombLabelBlink { 0%,100%{opacity:0.6} 50%{opacity:1} }

        /* ─── MENU OVERLAY ─── */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(5,5,5,0.97);
            display: flex; align-items: center; justify-content: center;
            flex-direction: column;
            color: #fff; cursor: pointer; text-align: center; z-index: 100;
        }
        #overlay h1 {
            font-size: 64px; margin: 0 0 6px; font-weight: 800; letter-spacing: 6px;
        }
        #overlay .subtitle {
            font-size: 12px; color: #555; letter-spacing: 4px;
            font-family: sans-serif; margin-bottom: 28px;
        }
        #stats-panel {
            background: rgba(255,255,255,0.035); border: 1px solid #1c1c1c;
            padding: 20px 36px; border-radius: 6px; margin-bottom: 20px;
            font-family: sans-serif; font-size: 15px; line-height: 2.2;
            min-width: 320px; color: #888; display: none;
        }
        #stats-panel b { color: #fff; font-family: 'Orbitron', sans-serif; }
        #stats-panel .stat-row {
            display: flex; justify-content: space-between;
            border-bottom: 1px solid #181818; padding: 4px 0;
        }
        #stats-panel .stat-row:last-child { border-bottom: none; }

        #hs-badge {
            font-size: 12px; color: #444; letter-spacing: 2px;
            font-family: sans-serif; margin-bottom: 18px; display: none;
        }
        #hs-badge span { color: #00ffff; font-family: 'Orbitron', sans-serif; }

        .click-hint {
            font-size: 12px; color: #444; letter-spacing: 2px;
            font-family: sans-serif; margin-top: 8px;
            animation: blink 1.5s ease-in-out infinite;
        }
        @keyframes blink { 0%,100%{opacity:0.4} 50%{opacity:1} }

        /* ─── SCORE POP ─── */
        @keyframes scorePop {
            0%   { transform: scale(1); }
            30%  { transform: scale(1.22); }
            100% { transform: scale(1); }
        }
        .score-pop { animation: scorePop 0.18s ease-out; }

        /* ─── QUICK KILL FLASH ─── */
        #quick-flash {
            position: absolute; top: 42%; left: 50%;
            transform: translate(-50%,-50%); pointer-events: none; z-index: 14;
            font-size: 20px; letter-spacing: 5px; color: #00ff88;
            opacity: 0;
        }
        @keyframes quickFlash {
            0%  { opacity: 1; transform: translate(-50%,-50%) scale(0.8); }
            40% { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
            100%{ opacity: 0; transform: translate(-50%,-60%) scale(1); }
        }

        /* ─── LOW HEALTH VIGNETTE ─── */
        #low-health-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none; z-index: 6;
            box-shadow: inset 0 0 0 rgba(255,0,0,0);
        }
        @keyframes heartbeat {
            0%,100% { box-shadow: inset 0 0 120px rgba(255,0,0,0.0); }
            50%      { box-shadow: inset 0 0 120px rgba(255,0,0,0.55); }
        }
        #low-health-overlay.pulse-1 { animation: heartbeat 1.4s ease-in-out infinite; }
        #low-health-overlay.pulse-2 { animation: heartbeat 0.7s ease-in-out infinite; }

        /* ─── MID-GAME NEW RECORD ─── */
        #newrecord-banner {
            position: absolute; top: 20%; left: 50%;
            transform: translate(-50%,-50%); pointer-events: none; z-index: 17;
            font-size: 18px; font-weight: 800; letter-spacing: 5px;
            color: #ffff00; text-shadow: 0 0 20px rgba(255,255,0,0.9);
            opacity: 0;
        }
        @keyframes newRecordPop {
            0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.7); }
            15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.08); }
            70%  { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%,-55%); }
        }

        /* ─── KILLS HUD ─── */
        #hud-kills {
            position: absolute; bottom: 28px; right: 36px;
            pointer-events: none; z-index: 10;
            text-align: right;
            text-shadow: 0 4px 8px rgba(0,0,0,0.9);
        }

        /* ─── LEADERBOARD IN MENU ─── */
        #hs-board {
            min-width: 320px; margin-bottom: 20px;
            font-family: sans-serif;
        }
        #hs-board-title {
            font-size: 11px; letter-spacing: 4px; color: #333;
            margin-bottom: 10px; text-align: center;
        }
        #hs-board-list {
            display: flex; flex-direction: column; gap: 4px;
        }
        .hs-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 6px 14px; border-radius: 4px;
            background: rgba(255,255,255,0.03);
            border: 1px solid #181818;
            font-size: 13px; color: #555;
            transition: opacity 0.3s;
        }
        .hs-row.rank-1 { border-color: #2a2a00; background: rgba(255,220,0,0.06); color: #888; }
        .hs-row .hs-rank { width: 22px; color: #2a2a2a; font-family: 'Orbitron', sans-serif; font-size: 11px; }
        .hs-row.rank-1 .hs-rank { color: #aa8800; }
        .hs-row .hs-score { font-family: 'Orbitron', sans-serif; font-weight: 800; color: #666; }
        .hs-row.rank-1 .hs-score { color: #ffcc00; }
        .hs-row .hs-meta { font-size: 11px; color: #2e2e2e; letter-spacing: 1px; }
        .hs-row.rank-1 .hs-meta { color: #444; }
        .hs-empty { text-align: center; color: #222; font-size: 12px; letter-spacing: 3px; padding: 12px 0; font-family: sans-serif; }

        /* ─── SENSITIVITY SLIDER ─── */
        #sens-panel {
            margin-bottom: 16px; text-align: center;
        }
        #sens-panel label {
            font-size: 10px; color: #333; letter-spacing: 3px;
            font-family: sans-serif; display: block; margin-bottom: 8px;
        }
        #sens-panel .sens-row {
            display: flex; align-items: center; gap: 12px; justify-content: center;
        }
        #sens-slider {
            -webkit-appearance: none; appearance: none;
            width: 180px; height: 3px; border-radius: 2px;
            background: #1a1a1a; outline: none; cursor: pointer;
        }
        #sens-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: #00ffff;
            box-shadow: 0 0 8px rgba(0,255,255,0.5); cursor: pointer;
        }
        #sens-slider::-moz-range-thumb {
            width: 14px; height: 14px; border-radius: 50%;
            background: #00ffff; border: none; cursor: pointer;
        }
        #sens-value {
            font-family: 'Orbitron', sans-serif; font-size: 13px;
            font-weight: 800; color: #00ffff; min-width: 32px;
        }
        .stat-grade {
            text-align: center; font-size: 48px; font-weight: 800;
            letter-spacing: 4px; margin: 4px 0 8px;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

<div id="damageOverlay"></div>
<div id="levelUpOverlay"></div>
<div id="low-health-overlay"></div>
<div id="streak-banner"></div>
<div id="level-up-banner"></div>
<div id="quick-flash"></div>
<div id="newrecord-banner">NEW RECORD</div>
<div id="bomb-warning">NE PAS TIRER</div>

<div id="hud-left" class="hud-container">
    <div class="hud-label">SCORE</div>
    <div id="score" class="hud-value">0</div>
</div>

<div id="hud-center" class="hud-container">
    <div id="timeDisplay">15.0</div>
    <div id="livesBox"></div>
    <div id="timer-bar-wrap"><div id="timer-bar-fill"></div></div>
</div>

<div id="hud-right" class="hud-container">
    <div class="hud-label">LEVEL</div>
    <div id="levelDisplay" class="hud-value">1</div>
</div>

<div id="hud-kills" class="hud-container">
    <div class="hud-label">KILLS</div>
    <div id="killsDisplay" class="hud-value" style="font-size:32px;color:#888;">0</div>
</div>

<div id="hud-combo" class="hud-container">
    <div class="hud-label">COMBO</div>
    <div id="comboValue">x1</div>
</div>

<!-- Dot crosshair -->
<div id="crosshair">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="5" cy="5" r="3" fill="rgba(0,255,255,0.95)"/>
    </svg>
</div>

<div id="overlay">
    <h1 id="mainMessage" style="color:#00ffff;">AIM TRAINER</h1>
    <p class="subtitle">V3 — ARCADE EDITION</p>
    <div id="hs-badge"></div>
    <div id="stats-panel"></div>
    <div id="hs-board">
        <div id="hs-board-title">MEILLEURS SCORES</div>
        <div id="hs-board-list"><div class="hs-empty">AUCUN SCORE</div></div>
    </div>
    <div id="legend" style="font-family:sans-serif;font-size:11px;color:#333;letter-spacing:2px;line-height:1;margin-bottom:6px;text-align:left;border:1px solid #181818;padding:12px 18px;border-radius:4px;background:rgba(255,255,255,0.02);">
        <div style="color:#222;letter-spacing:4px;margin-bottom:10px;font-size:10px;">CIBLES QUI APPARAISSENT</div>
        <div style="display:flex;flex-direction:column;gap:7px;">
            <div style="display:flex;align-items:center;gap:10px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#888;flex-shrink:0"></span><span><span style="color:#666">COULEURS</span> — TIRER</span></div>
            <div style="display:flex;align-items:center;gap:10px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ffcc00;flex-shrink:0"></span><span><span style="color:#554400">OR</span> — RAPIDE, x3 points</span></div>
            <div style="display:flex;align-items:center;gap:10px;"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:#ff3333;flex-shrink:0"></span><span><span style="color:#550000">BOMBE</span> — NE PAS TIRER, disparaît</span></div>
            <div style="display:flex;align-items:center;gap:10px;"><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#ff44aa;flex-shrink:0"></span><span><span style="color:#551133">COEUR</span> — +1 VIE</span></div>
        </div>
    </div>
    <div id="sens-panel">
        <label>SENSIBILITE</label>
        <div class="sens-row">
            <input type="range" id="sens-slider" min="1" max="20" step="1" value="8">
            <span id="sens-value">8</span>
        </div>
    </div>
    <div class="click-hint" id="clickHint">CLIQUER POUR COMMENCER</div>
</div>

<script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
<script type="importmap">{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/" } }</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ─── ENGINE ───────────────────────────────────────────────────────────────────
let camera, scene, renderer, controls, clock;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(0, 0);

// ─── STATE ───────────────────────────────────────────────────────────────────
let targets = [];
let score = 0, lives = 5, level = 1, levelTimer = 15.0;
let isPlaying = false, state = 'START';
let combo = 0, maxCombo = 0, shotsFired = 0, shotsHit = 0, killCount = 0;
let activeParticles = [], bombLabels = [];
let bombWarningTimeout = null;
let highScore = parseInt(localStorage.getItem('aimtrainer_hs') || '0');
let recordNotified = false; // prevent repeated mid-game new record banners

const MAX_LIVES = 8;
const BOUNDS = { minX: -8, maxX: 8, minY: 1.5, maxY: 6.5 };
const QUICK_KILL_WINDOW = 2.2; // seconds

// ─── RECOIL ──────────────────────────────────────────────────────────────────
let recoilAmount = 0;
let bobTime = 0;

// ─── AIM STATE ───────────────────────────────────────────────────────────────
// Yaw/pitch as separate floats so we control them precisely
let camYaw   = 0;  // horizontal look (radians)
let camPitch = 0;  // vertical look (radians), clamped

// Mouse inertia — residual velocity that decays after mouse stops
let aimVelX = 0;
let aimVelY = 0;

// Sensitivity: units = radians per pixel * scale factor
// Slider 1-20 maps to 0.0003 – 0.006 rad/px
let sensitivity = parseFloat(localStorage.getItem('aimtrainer_sens') || '8');
function sensFactor(s) { return 0.0003 + (s - 1) / 19 * 0.0057; }

// ─── WEAPON ──────────────────────────────────────────────────────────────────
let weaponGroup, muzzleFlash, slideMesh;

// ─── DOM ─────────────────────────────────────────────────────────────────────
const scoreEl       = document.getElementById('score');
const levelEl       = document.getElementById('levelDisplay');
const timeEl        = document.getElementById('timeDisplay');
const livesBox      = document.getElementById('livesBox');
const dmgOverlay    = document.getElementById('damageOverlay');
const lvlOverlay    = document.getElementById('levelUpOverlay');
const overlay       = document.getElementById('overlay');
const mainMsg       = document.getElementById('mainMessage');
const statsPanel    = document.getElementById('stats-panel');
const clickHint     = document.getElementById('clickHint');
const crosshair     = document.getElementById('crosshair');
const streakBanner  = document.getElementById('streak-banner');
const levelBanner   = document.getElementById('level-up-banner');
const comboEl       = document.getElementById('comboValue');
const bombWarning   = document.getElementById('bomb-warning');
const quickFlash    = document.getElementById('quick-flash');
const hsBadge       = document.getElementById('hs-badge');
const timerBarFill  = document.getElementById('timer-bar-fill');
const legendEl      = document.getElementById('legend');
const lowHealthEl   = document.getElementById('low-health-overlay');
const newRecordEl   = document.getElementById('newrecord-banner');
const killsEl       = document.getElementById('killsDisplay');
const hsBoardList   = document.getElementById('hs-board-list');
const sensSlider    = document.getElementById('sens-slider');
const sensValueEl   = document.getElementById('sens-value');

// Reusable vec3 to avoid allocation in hot loops
const _tmpVec = new THREE.Vector3();

// ─── AUDIO ───────────────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// ─── MASTER BUS — compressor prevents clipping during rapid fire ──────────────
const masterBus = audioCtx.createDynamicsCompressor();
masterBus.threshold.value = -14;
masterBus.knee.value      = 8;
masterBus.ratio.value     = 4;
masterBus.attack.value    = 0.002;
masterBus.release.value   = 0.12;

// ═════════════════════════════════════════════════════════════════════════════
// HELPERS
// ═════════════════════════════════════════════════════════════════════════════

function getMaxTargets() { return Math.min(1 + Math.floor((level - 1) / 2), 5); }
function getComboMult(c = combo) { return 1 + Math.floor(c / 3); }

function worldToScreen(pos3D) {
    const v = pos3D.clone().project(camera);
    return {
        x: (v.x * 0.5 + 0.5) * window.innerWidth,
        y: (-v.y * 0.5 + 0.5) * window.innerHeight
    };
}

// ═════════════════════════════════════════════════════════════════════════════
// DISPLAY
// ═════════════════════════════════════════════════════════════════════════════

function updateLives() {
    let html = '';
    for (let i = 0; i < MAX_LIVES; i++)
        html += i < lives ? '<span class="heart">♥</span>' : '<span class="heart empty">♡</span>';
    livesBox.innerHTML = html;
}

function updateCombo() {
    const m = getComboMult();
    comboEl.innerText = `x${m}`;
    if (combo >= 3) {
        const hue = Math.min(45 + combo * 4, 340);
        comboEl.style.color = `hsl(${hue},100%,60%)`;
        comboEl.style.fontSize = Math.min(44 + combo * 1.5, 80) + 'px';
        comboEl.classList.add('active');
    } else {
        comboEl.style.color = '#444';
        comboEl.style.fontSize = '44px';
        comboEl.classList.remove('active');
    }
}

// ═════════════════════════════════════════════════════════════════════════════
// VFX
// ═════════════════════════════════════════════════════════════════════════════

function flashDamage() {
    dmgOverlay.style.transition = 'none';
    dmgOverlay.style.boxShadow = 'inset 0 0 200px rgba(255,0,0,0.9)';
    setTimeout(() => { dmgOverlay.style.transition = 'box-shadow 0.4s ease-out'; dmgOverlay.style.boxShadow = 'inset 0 0 200px rgba(255,0,0,0)'; }, 40);
}

function flashLevelUp() {
    lvlOverlay.style.transition = 'none';
    lvlOverlay.style.boxShadow = 'inset 0 0 200px rgba(0,255,255,0.7)';
    setTimeout(() => { lvlOverlay.style.transition = 'box-shadow 0.6s ease-out'; lvlOverlay.style.boxShadow = 'inset 0 0 200px rgba(0,255,255,0)'; }, 50);
}

function screenShake(intensity = 1) {
    const c = renderer.domElement;
    let n = 0;
    const iv = setInterval(() => {
        c.style.transform = `translate(${(Math.random()-.5)*intensity*14}px,${(Math.random()-.5)*intensity*14}px)`;
        if (++n >= 5) { clearInterval(iv); c.style.transform = ''; }
    }, 22);
}

function applyRecoil(amount = 0.025) {
    recoilAmount = Math.min(recoilAmount + amount, 0.07);
}

function showPopup(worldPos, text, color = '#fff') {
    const s = worldToScreen(worldPos);
    const el = document.createElement('div');
    el.className = 'score-popup';
    el.innerText = text;
    el.style.left = s.x + 'px';
    el.style.top  = s.y + 'px';
    el.style.color = color;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 900);
}

function addScore(pts) {
    score += pts;
    scoreEl.innerText = score;
    scoreEl.classList.remove('score-pop');
    void scoreEl.offsetWidth;
    scoreEl.classList.add('score-pop');
}

function updateTimerBar(val, max = 15) {
    const pct = Math.max(0, val / max) * 100;
    timerBarFill.style.width = pct + '%';
    timerBarFill.style.background = val < 4 ? '#ff3333' : val < 8 ? '#ffaa00' : '#00ffff';
}

function showQuickKill() {
    quickFlash.style.animation = 'none';
    void quickFlash.offsetWidth;
    quickFlash.style.animation = 'quickFlash 0.9s ease-out forwards';
    quickFlash.innerText = 'RAPIDE!';
}

const STREAKS = {
    5:  { msg: 'ON FIRE!',     cls: 'streak-fire' },
    10: { msg: 'UNSTOPPABLE!', cls: 'streak-zap' },
    15: { msg: 'GODLIKE!',     cls: 'streak-godlike' },
    20: { msg: 'INSANE!!',     cls: 'streak-insane' },
};

function checkStreak() {
    const d = STREAKS[combo];
    if (!d) return;
    streakBanner.className = d.cls;
    streakBanner.innerText = d.msg;
    streakBanner.style.animation = 'none';
    void streakBanner.offsetWidth;
    streakBanner.style.animation = 'streakPop 1.7s ease-out forwards';
    playSound('milestone');
}

function showLevelBanner(lv) {
    levelBanner.innerText = `LEVEL ${lv}`;
    levelBanner.style.animation = 'none';
    void levelBanner.offsetWidth;
    levelBanner.style.animation = 'levelBanner 2s ease-out forwards';
}

function showBombWarning() {
    bombWarning.style.opacity = '1';
    if (bombWarningTimeout) clearTimeout(bombWarningTimeout);
    bombWarningTimeout = setTimeout(() => { bombWarning.style.opacity = '0'; }, 2000);
}

// Bomb 3D labels
function spawnBombLabel(target) {
    const el = document.createElement('div');
    el.className = 'bomb-label';
    el.innerText = 'BOMBE';
    document.body.appendChild(el);
    bombLabels.push({ el, target });
    return el;
}

function updateBombLabels() {
    for (let i = bombLabels.length - 1; i >= 0; i--) {
        const { el, target } = bombLabels[i];
        if (!targets.includes(target)) { el.remove(); bombLabels.splice(i, 1); continue; }
        _tmpVec.copy(target.position).y += target.userData.radius + 0.4;
        const s = worldToScreen(_tmpVec);
        el.style.left = s.x + 'px';
        el.style.top  = s.y + 'px';
    }
}

// ─── LEADERBOARD ─────────────────────────────────────────────────────────────

function loadLeaderboard() {
    try { return JSON.parse(localStorage.getItem('aimtrainer_lb') || '[]'); }
    catch { return []; }
}

function saveToLeaderboard(entry) {
    let lb = loadLeaderboard();
    lb.push(entry);
    lb.sort((a, b) => b.score - a.score);
    lb = lb.slice(0, 5);
    localStorage.setItem('aimtrainer_lb', JSON.stringify(lb));
    return lb;
}

function renderLeaderboard(lb) {
    if (!lb || lb.length === 0) {
        hsBoardList.innerHTML = '<div class="hs-empty">AUCUN SCORE</div>';
        return;
    }
    hsBoardList.innerHTML = lb.map((e, i) => `
        <div class="hs-row ${i === 0 ? 'rank-1' : ''}">
            <span class="hs-rank">${i + 1}</span>
            <span class="hs-score">${e.score.toLocaleString()}</span>
            <span class="hs-meta">LV${e.level} &nbsp; ${e.acc}% &nbsp; ${e.grade}</span>
        </div>
    `).join('');
}

function getGrade(acc) {
    if (acc >= 90) return { label: 'S', color: '#ffff00' };
    if (acc >= 75) return { label: 'A', color: '#00ff88' };
    if (acc >= 55) return { label: 'B', color: '#00ccff' };
    if (acc >= 35) return { label: 'C', color: '#ff8800' };
    return { label: 'D', color: '#ff3333' };
}

// ─── MID-GAME NEW RECORD ─────────────────────────────────────────────────────

function checkMidGameRecord() {
    if (!recordNotified && score > highScore && highScore > 0) {
        recordNotified = true;
        newRecordEl.style.animation = 'none';
        void newRecordEl.offsetWidth;
        newRecordEl.style.animation = 'newRecordPop 2.2s ease-out forwards';
        playSound('newhs');
    }
}

// ─── LOW HEALTH ──────────────────────────────────────────────────────────────

function updateLowHealth() {
    lowHealthEl.className = '';
    if (lives === 1) lowHealthEl.classList.add('pulse-2');
    else if (lives === 2) lowHealthEl.classList.add('pulse-1');
}

// ─── KILLS DISPLAY ───────────────────────────────────────────────────────────

function addKill() {
    killCount++;
    killsEl.innerText = killCount;
    killsEl.classList.remove('score-pop');
    void killsEl.offsetWidth;
    killsEl.classList.add('score-pop');
}


// ═════════════════════════════════════════════════════════════════════════════

function spawnParticles(position, color, count = 10) {
    const frags = [];
    for (let i = 0; i < count; i++) {
        const size = 0.05 + Math.random() * 0.12;
        const geo  = new THREE.IcosahedronGeometry(size, 0);
        const mat  = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 1 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.copy(position);
        mesh.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
        const sp = 0.04 + Math.random() * 0.11;
        const th = Math.random() * Math.PI * 2;
        const ph = Math.acos(2 * Math.random() - 1);
        const vel = new THREE.Vector3(Math.sin(ph)*Math.cos(th)*sp, Math.sin(ph)*Math.sin(th)*sp, Math.cos(ph)*sp*0.2);
        scene.add(mesh);
        frags.push({ mesh, vel });
    }
    activeParticles.push({ frags, t0: clock.elapsedTime, dur: 0.55 });
}

// ═════════════════════════════════════════════════════════════════════════════
// SOUND
// ═════════════════════════════════════════════════════════════════════════════

function playSound(type, extra = 0) {
    const t   = audioCtx.currentTime;
    const out = masterBus;

    // ── Helpers ────────────────────────────────────────────────────────────────
    // Symmetric random in [-range, +range]
    const rnd = range => (Math.random() - 0.5) * 2 * range;
    // Humanised pitch: base × (1 ± variance)
    const hp  = (base, variance = 0.05) => base * (1 + rnd(variance));

    // One oscillator with optional frequency sweep
    const osc1 = (freq, wave, vol, dur, freqEnd = null, delay = 0) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = wave;
        o.frequency.setValueAtTime(freq, t + delay);
        if (freqEnd) o.frequency.exponentialRampToValueAtTime(freqEnd, t + delay + dur);
        g.gain.setValueAtTime(0, t + delay);
        g.gain.linearRampToValueAtTime(vol, t + delay + 0.004);   // tiny attack avoids click
        g.gain.exponentialRampToValueAtTime(0.001, t + delay + dur);
        o.connect(g); g.connect(out);
        o.start(t + delay); o.stop(t + delay + dur + 0.02);
    };

    // Band-limited noise burst (real gunshot/impact texture)
    const noise = (vol, dur, loFreq, hiFreq, delay = 0) => {
        const len = Math.ceil(audioCtx.sampleRate * (dur + 0.01));
        const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const d   = buf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        const filt = audioCtx.createBiquadFilter();
        filt.type = 'bandpass';
        filt.frequency.value = Math.sqrt(loFreq * hiFreq); // geometric center
        filt.Q.value = Math.sqrt(loFreq * hiFreq) / (hiFreq - loFreq);
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(vol, t + delay);
        g.gain.exponentialRampToValueAtTime(0.001, t + delay + dur);
        src.connect(filt); filt.connect(g); g.connect(out);
        src.start(t + delay); src.stop(t + delay + dur + 0.01);
    };

    // Panned gain node (stereo width for hit sounds)
    const pannedGain = (vol, panAmt) => {
        const g = audioCtx.createGain();
        g.gain.value = vol;
        if (audioCtx.createStereoPanner) {
            const p = audioCtx.createStereoPanner();
            p.pan.value = panAmt;
            g.connect(p); p.connect(out);
            return g;
        }
        g.connect(out);
        return g;
    };

    // ── Sounds ─────────────────────────────────────────────────────────────────

    if (type === 'hit') {
        // WAV + combo pitch climb + humanization + random stereo pan
        if (hitBuffer) {
            const src = audioCtx.createBufferSource();
            src.buffer = hitBuffer;
            // Pitch: climbs with combo, +small random variance each time
            src.playbackRate.value = hp(0.88 + Math.min(extra * 0.04, 0.55), 0.14);
            const g = pannedGain(0.48 + rnd(0.06), rnd(0.35));
            src.connect(g);
            src.start();
        } else {
            osc1(hp(680 + extra * 50), 'sine', 0.055, 0.1);
        }

    } else if (type === 'fire') {
        // Pistol: sub thud + mid punch + high crack noise — 3 simultaneous layers
        osc1(hp(62, 0.12), 'sine',     0.14, 0.09,  22);        // sub kick
        osc1(hp(190, 0.09),'triangle', 0.07, 0.05,  65);        // mid body
        noise(0.22, 0.022, 2500, 10000);                         // high crack
        noise(0.08, 0.04,  200,  900);                           // low body noise

    } else if (type === 'miss') {
        // Bullet impact: thud + ricochet whine + wall debris
        osc1(hp(85, 0.09),  'sine',     0.08, 0.13, 32);        // thud
        osc1(hp(360, 0.07), 'sawtooth', 0.04, 0.30, hp(72, 0.05)); // ricochet descend
        noise(0.07, 0.035, 350, 2200);                           // wall impact

    } else if (type === 'bomb') {
        // Explosion: deep sub + rumble + scatter debris
        osc1(hp(52, 0.12),  'sine',     0.16, 0.45, 16);        // sub boom
        osc1(hp(115, 0.10), 'sawtooth', 0.08, 0.28, 38);        // body rumble
        noise(0.18, 0.20, 60, 700);                              // low rumble noise
        noise(0.07, 0.08, 900, 5000);                            // debris scatter

    } else if (type === 'gold') {
        // Coin shimmer: detuned chord — each partial slightly off for chorus/shimmer
        const base = hp(880, 0.03);
        [0, 4, 7, 12].forEach((semitones, i) => {
            // Musical intervals + per-partial micro-detune
            const f = base * Math.pow(2, semitones / 12) * (1 + rnd(0.007));
            osc1(f, 'sine', 0.024, 0.16 + i * 0.025, null, i * 0.012);
        });
        osc1(hp(3520, 0.02), 'sine', 0.012, 0.09); // shimmer top

    } else if (type === 'heart') {
        // Warm rising interval — reassuring
        osc1(hp(440, 0.04), 'sine', 0.045, 0.28, hp(660, 0.03));
        osc1(hp(660, 0.04), 'sine', 0.028, 0.22, hp(880, 0.03));

    } else if (type === 'levelup') {
        // Ascending arpeggio with humanised timing and pitch
        [300, 420, 560, 800, 1120].forEach((f, i) => {
            const delay = i * 0.075 + rnd(0.009);
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.value = hp(f, 0.02);
            g.gain.setValueAtTime(0, t + delay);
            g.gain.linearRampToValueAtTime(0.07, t + delay + 0.018);
            g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.2);
            o.connect(g); g.connect(out);
            o.start(t); o.stop(t + delay + 0.24);
        });

    } else if (type === 'gameover') {
        // Dramatic descent + low drone + impact noise
        osc1(hp(295, 0.04), 'sawtooth', 0.07, 0.72, hp(52, 0.03));
        osc1(hp(148, 0.04), 'sine',     0.04, 0.95, hp(28, 0.03));
        noise(0.04, 0.35, 80, 600);

    } else if (type === 'milestone') {
        // Rising cascade — slightly detuned, staggered
        [500, 700, 1000, 1400, 1900].forEach((f, i) => {
            const delay = i * 0.062 + rnd(0.008);
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.value = hp(f, 0.03);
            g.gain.setValueAtTime(0, t + delay);
            g.gain.linearRampToValueAtTime(0.065, t + delay + 0.014);
            g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.16);
            o.connect(g); g.connect(out);
            o.start(t); o.stop(t + delay + 0.2);
        });

    } else if (type === 'quick') {
        osc1(hp(1100, 0.04), 'sine', 0.05, 0.07);
        osc1(hp(1650, 0.04), 'sine', 0.03, 0.055, null, 0.025);

    } else if (type === 'newhs') {
        // Perfect 4th intervals, slightly detuned for richness
        [500, 667, 889, 1185, 1580].forEach((f, i) => {
            const delay = i * 0.068 + rnd(0.009);
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.value = hp(f, 0.02);
            g.gain.setValueAtTime(0, t + delay);
            g.gain.linearRampToValueAtTime(0.065, t + delay + 0.018);
            g.gain.exponentialRampToValueAtTime(0.001, t + delay + 0.18);
            o.connect(g); g.connect(out);
            o.start(t); o.stop(t + delay + 0.22);
        });
    }
}

// ═════════════════════════════════════════════════════════════════════════════
// TARGETS
// ═════════════════════════════════════════════════════════════════════════════

function pickType() {
    const r = Math.random();
    const bombCount = targets.filter(t => t.userData.type === 'bomb').length;
    const maxBombs  = Math.max(0, getMaxTargets() - 1); // always leave 1 non-bomb slot

    // Never fill all slots with bombs
    if (bombCount >= maxBombs) {
        if (level >= 2 && r < 0.07) return 'heart';
        return r < 0.35 ? 'gold' : 'normal';
    }

    if (level >= 2 && r < 0.05)  return 'heart';
    if (level >= 3 && r < 0.20)  return 'bomb';
    if (r < 0.28)                return 'gold';
    return 'normal';
}

function spawnTarget() {
    const type = pickType();
    let radius, color, shrinkMult, speedMult, geo;

    if (type === 'normal') {
        radius = 0.8; color = new THREE.Color().setHSL(Math.random(),1,0.5);
        shrinkMult = 1.0; speedMult = 1.0;
        geo = new THREE.IcosahedronGeometry(radius, 0);
    } else if (type === 'gold') {
        radius = 0.52; color = new THREE.Color(1.0, 0.82, 0.1);
        shrinkMult = 1.2; speedMult = 1.5;
        geo = new THREE.IcosahedronGeometry(radius, 0);
    } else if (type === 'bomb') {
        radius = 0.95; color = new THREE.Color(0.88, 0.04, 0.04);
        shrinkMult = 0.35; speedMult = 0.6;
        geo = new THREE.TetrahedronGeometry(radius, 0);
    } else { // heart
        radius = 0.62; color = new THREE.Color(1.0, 0.2, 0.6);
        shrinkMult = 2.2; speedMult = 0.9;
        geo = new THREE.OctahedronGeometry(radius, 0);
    }

    const mat = new THREE.MeshStandardMaterial({
        color, roughness: type === 'gold' ? 0.04 : 0.12,
        metalness: type === 'gold' ? 0.95 : 0.1,
        emissive: color,
        emissiveIntensity: type === 'bomb' ? 0.8 : type === 'gold' ? 1.8 : 0.55,
        flatShading: true
    });
    const mesh = new THREE.Mesh(geo, mat);

    // Gold gets a point light child for environmental glow
    if (type === 'gold') {
        const pt = new THREE.PointLight(0xffcc00, 2.5, 8);
        mesh.add(pt);
        mesh.userData.pointLight = pt;
    }

    // Size variation — same geo, different visual scale (0.65× to 1.35×)
    const sizeVar = type === 'gold' ? (0.7 + Math.random() * 0.5)
                  : type === 'bomb' ? (0.85 + Math.random() * 0.3)
                  : (0.55 + Math.random() * 0.9);

    // Depth variation — closer targets feel faster, farther feel smaller
    const depthVar = -15 - Math.random() * 8;

    // Minimum distance from existing targets
    const MIN_DIST = 2.0;
    let attempts = 0;
    do {
        mesh.position.x = BOUNDS.minX + Math.random() * (BOUNDS.maxX - BOUNDS.minX);
        mesh.position.y = BOUNDS.minY + Math.random() * (BOUNDS.maxY - BOUNDS.minY);
        attempts++;
    } while (
        attempts < 8 &&
        targets.some(t => t.position.distanceTo(mesh.position) < MIN_DIST)
    );
    mesh.position.z = depthVar;

    // Velocity
    const baseSpeed = 0.02 + level * 0.008;
    const speed = baseSpeed * speedMult;
    const angle = Math.random() * Math.PI * 2;

    // Calcule la vitesse et la direction dès le départ
    const maxSpd = (0.022 + level * 0.007) * speedMult;
    const initialDir = Math.random() < 0.5 ? -1 : 1;

    mesh.userData = {
        type, radius,
        shrinkRate: (0.0008 + level * 0.00025) * shrinkMult,
        birthTime: clock.elapsedTime,
        baseColor: color.clone(),
        spawnScale: 0.0,
        sizeVar,

        vx: initialDir * maxSpd,
        vy: (Math.random() - 0.5) * maxSpd * 0.4,
        tvx: initialDir * maxSpd,
        tvy: (Math.random() - 0.5) * maxSpd * 0.4,
        maxSpeed: maxSpd,

        nextBehaviourIn: 0.4 + Math.random() * 0.8,
        behaviour: 'strafe-right',
        strafeDir: initialDir,
        vertBias: (Math.random() - 0.5) * 0.3,
        jukeCooldown: 0,

        // Jump/crouch
        jumpVy: 0,         // current vertical impulse
        jumpCooldown: 0,   // time before next jump/crouch
    };

    scene.add(mesh);
    targets.push(mesh);

    if (type === 'bomb') { showBombWarning(); spawnBombLabel(mesh); }
}

// ═════════════════════════════════════════════════════════════════════════════
// CLICK
// ═════════════════════════════════════════════════════════════════════════════

function onShoot() {
    if (!isPlaying || state !== 'PLAYING') return;

    playSound('fire');
    shotsFired++;

    // Weapon muzzle flash + slide
    muzzleFlash.visible = true;
    muzzleFlash.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
    slideMesh.position.z = -0.22;
    applyRecoil(0.03);
    setTimeout(() => { muzzleFlash.visible = false; slideMesh.position.z = -0.25; }, 38);

    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(targets);

    if (hits.length > 0) {
        const hitMesh = hits[0].object;
        const { type, baseColor, birthTime } = hitMesh.userData;
        const hitPos = hitMesh.position.clone();

        scene.remove(hitMesh);
        targets = targets.filter(t => t !== hitMesh);

        spawnParticles(hitPos, baseColor, type === 'bomb' ? 22 : 10);

        crosshair.classList.add('hit');
        setTimeout(() => crosshair.classList.remove('hit'), 65);

        const isQuick = (clock.elapsedTime - birthTime) < QUICK_KILL_WINDOW;

        if (type === 'bomb') {
            playSound('bomb');
            flashDamage(); screenShake(1.6);
            showPopup(hitPos, 'BOMBE  -1 VIE', '#ff3333');
            combo = 0; updateCombo();
            lives = Math.max(0, lives - 1); updateLives(); updateLowHealth();
            if (lives <= 0) { gameOver(); return; }

        } else if (type === 'heart') {
            playSound('heart');
            combo++; if (combo > maxCombo) maxCombo = combo;
            shotsHit++; addKill();
            showPopup(hitPos, '+1 VIE', '#ff44aa');
            if (lives < MAX_LIVES) { lives++; updateLives(); updateLowHealth(); }
            updateCombo(); checkStreak();

        } else {
            combo++; if (combo > maxCombo) maxCombo = combo;
            shotsHit++; addKill(); updateCombo(); checkStreak();

            const mult   = getComboMult();
            const bonus  = type === 'gold' ? 3 : 1;
            let pts = 10 * level * mult * bonus;

            if (isQuick && type !== 'bomb') {
                pts = Math.round(pts * 1.5);
                showQuickKill();
                playSound('quick');
            } else {
                if (type === 'gold') playSound('gold');
                else playSound('hit', combo);
            }

            addScore(pts);
            checkMidGameRecord();

            const col = type === 'gold' ? '#ffcc00' : (mult > 1 ? `hsl(${45+combo*4},100%,65%)` : '#fff');
            const lbl = type === 'gold'
                ? `GOLD  +${pts}`
                : (mult > 1 ? `x${mult}  +${pts}` : `+${pts}`);
            showPopup(hitPos, lbl, col);
        }

    } else {
        // Miss
        playSound('miss');
        flashDamage(); screenShake(0.8);
        crosshair.classList.add('miss');
        setTimeout(() => crosshair.classList.remove('miss'), 85);
        combo = 0; updateCombo();
        lives = Math.max(0, lives - 1); updateLives(); updateLowHealth();
        if (lives <= 0) { gameOver(); return; }
    }
}

// ═════════════════════════════════════════════════════════════════════════════
// GAME FLOW
// ═════════════════════════════════════════════════════════════════════════════

function gameOver() {
    isPlaying = false; state = 'GAME_OVER';
    document.exitPointerLock();
    playSound('gameover');
    lowHealthEl.className = '';

    const isNewHS = score > highScore;
    if (isNewHS) { highScore = score; localStorage.setItem('aimtrainer_hs', highScore); }

    const acc   = shotsFired > 0 ? Math.round((shotsHit / shotsFired) * 100) : 0;
    const grade = getGrade(acc);
    const lb    = saveToLeaderboard({ score, level, acc, grade: grade.label });
    renderLeaderboard(lb);

    const accColor = acc >= 70 ? '#00ff88' : acc >= 40 ? '#ffcc00' : '#ff4444';

    overlay.style.display = 'flex';
    mainMsg.innerText = 'GAME OVER';
    mainMsg.style.color = '#ff3333';
    mainMsg.style.textShadow = '0 0 30px rgba(255,51,51,0.7)';
    if (legendEl) legendEl.style.display = 'none';

    hsBadge.style.display = isNewHS ? 'block' : 'none';
    if (isNewHS) { hsBadge.innerHTML = `NOUVEAU RECORD — <span>${highScore.toLocaleString()}</span>`; playSound('newhs'); }

    statsPanel.style.display = 'block';
    statsPanel.innerHTML = `
        <div class="stat-grade" style="color:${grade.color}">${grade.label}</div>
        <div class="stat-row"><span>SCORE</span><b>${score.toLocaleString()}</b></div>
        <div class="stat-row"><span>NIVEAU</span><b>${level}</b></div>
        <div class="stat-row"><span>PRECISION</span><b style="color:${accColor}">${acc}%</b></div>
        <div class="stat-row"><span>KILLS</span><b>${killCount}</b></div>
        <div class="stat-row"><span>MEILLEUR COMBO</span><b>${maxCombo} HITS  (x${getComboMult(maxCombo)})</b></div>
        <div class="stat-row"><span>TIRS</span><b>${shotsHit} / ${shotsFired}</b></div>
    `;
    clickHint.innerText = 'CLIQUER POUR REJOUER';
}

function levelUpAnim() {
    playSound('levelup'); flashLevelUp(); showLevelBanner(level);
    levelEl.classList.remove('level-up-anim');
    void levelEl.offsetWidth;
    levelEl.classList.add('level-up-anim');
}

function resetGame() {
    score = 0; level = 1; lives = 5; levelTimer = 15.0;
    combo = 0; maxCombo = 0; shotsFired = 0; shotsHit = 0; killCount = 0;
    recordNotified = false;
    scoreEl.innerText = 0; levelEl.innerText = 1; killsEl.innerText = 0;
    timeEl.style.color = '#fff';
    updateTimerBar(15);
    scoreEl.classList.remove('score-pop');
    lowHealthEl.className = '';

    targets.forEach(t => scene.remove(t)); targets = [];
    activeParticles.forEach(p => p.frags.forEach(f => scene.remove(f.mesh))); activeParticles = [];
    bombLabels.forEach(b => b.el.remove()); bombLabels = [];

    updateLives(); updateCombo();
    statsPanel.style.display = 'none'; hsBadge.style.display = 'none';
    mainMsg.style.textShadow = '';
    renderLeaderboard(loadLeaderboard());
    spawnTarget();
}

// ═════════════════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════════════════

function init() {
    clock = new THREE.Clock();
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050505);
    scene.fog = new THREE.FogExp2(0x050505, 0.022);

    camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
    camera.position.y = 1.7;
    camera.rotation.order = 'YXZ'; // standard FPS order: yaw first, then pitch

    buildWeapon();
    buildEnvironment();

    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    controls = new PointerLockControls(camera, document.body);

    overlay.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(() => {});
        if (state === 'GAME_OVER' || state === 'START') resetGame();
        controls.lock();
    });

    controls.addEventListener('lock', () => {
        overlay.style.display = 'none';
        isPlaying = true; state = 'PLAYING';
        // Sync our yaw/pitch from current camera rotation so no jump
        camYaw   = camera.rotation.y;
        camPitch = camera.rotation.x;
        aimVelX  = 0;
        aimVelY  = 0;
    });

    controls.addEventListener('unlock', () => {
        isPlaying = false;
        if (state === 'PLAYING') {
            overlay.style.display = 'flex';
            mainMsg.innerText = 'PAUSE';
            mainMsg.style.color = '#fff';
            statsPanel.style.display = 'none';
            hsBadge.style.display = 'none';
            if (legendEl) legendEl.style.display = 'none';
            clickHint.innerText = 'CLIQUER POUR CONTINUER';
        }
    });

    scene.add(new THREE.AmbientLight(0xffffff, 0.15));
    const dir = new THREE.DirectionalLight(0xffffff, 0.3);
    dir.position.set(-10, 20, -10); scene.add(dir);

    updateLives(); updateCombo();
    renderLeaderboard(loadLeaderboard());
    initSensSlider();

    window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
    });
    window.addEventListener('mousedown', onShoot);
    window.addEventListener('mousemove', onMouseMove);
}

function initSensSlider() {
    sensSlider.value = sensitivity;
    sensValueEl.innerText = sensitivity;
    sensSlider.addEventListener('input', () => {
        sensitivity = parseFloat(sensSlider.value);
        sensValueEl.innerText = sensitivity;
        localStorage.setItem('aimtrainer_sens', sensitivity);
    });
    // Prevent slider click from triggering overlay click (which would lock pointer)
    sensSlider.addEventListener('mousedown', e => e.stopPropagation());
}

function onMouseMove(e) {
    // ── FPS camera rotation ──────────────────────────────────────────────────
    if (isPlaying && document.pointerLockElement) {
        const sf = sensFactor(sensitivity);
        // Add raw delta to inertia velocity (capped to prevent huge jumps)
        const dx = Math.max(-80, Math.min(80, e.movementX));
        const dy = Math.max(-80, Math.min(80, e.movementY));
        aimVelX += dx * sf;
        aimVelY += dy * sf;
    }

    // ── Adaptive crosshair color ─────────────────────────────────────────────
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(targets);
    const dot = crosshair.querySelector('circle');
    if (hits.length > 0 && dot) {
        const tp = hits[0].object.userData.type;
        const col = tp === 'bomb'  ? 'rgba(255,60,60,0.95)'
                  : tp === 'heart' ? 'rgba(255,80,180,0.95)'
                  : tp === 'gold'  ? 'rgba(255,210,0,0.95)'
                  : 'rgba(0,255,255,0.9)';
        dot.setAttribute('fill', col);
    } else if (dot) {
        dot.setAttribute('fill', 'rgba(0,255,255,0.95)');
    }
}

function buildEnvironment() {
    // ── Dark grey grid floor ──
    const gridHelper = new THREE.GridHelper(300, 80, 0x1c1c1c, 0x141414);
    gridHelper.position.y = 0.01;
    scene.add(gridHelper);

    // ── Second tighter grid ──
    const innerGrid = new THREE.GridHelper(40, 20, 0x222222, 0x1a1a1a);
    innerGrid.position.y = 0.02;
    scene.add(innerGrid);

    // ── Distant flat terrain silhouette ──
    const horizGeo = new THREE.PlaneGeometry(300, 60);
    horizGeo.rotateX(-Math.PI / 2);
    const pos = horizGeo.attributes.position;
    for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), z = pos.getZ(i);
        const d = Math.sqrt(x*x + z*z);
        if (d > 40) pos.setY(i, (d - 40) * 0.35 + Math.random() * 6);
    }
    horizGeo.computeVertexNormals();
    scene.add(new THREE.Mesh(horizGeo, new THREE.MeshStandardMaterial({ color: 0x080808, flatShading: true, roughness: 1 })));

    // ── Ambient floating debris ──
    const debrisMat = new THREE.MeshBasicMaterial({ color: 0x1a1a1a, wireframe: true });
    for (let i = 0; i < 18; i++) {
        const g = new THREE.OctahedronGeometry(0.25 + Math.random() * 0.5, 0);
        const m = new THREE.Mesh(g, debrisMat);
        m.position.set(
            (Math.random() - 0.5) * 50,
            3 + Math.random() * 14,
            -20 - Math.random() * 40
        );
        m.userData.rotSpeed = (Math.random() - 0.5) * 0.008;
        m.userData.floatSpeed = 0.3 + Math.random() * 0.5;
        m.userData.floatAmp = 0.08 + Math.random() * 0.15;
        m.userData.floatOffset = Math.random() * Math.PI * 2;
        m.userData.baseY = m.position.y;
        scene.add(m);
        scene.userData.debris = scene.userData.debris || [];
        scene.userData.debris.push(m);
    }
}

function buildWeapon() {
    weaponGroup = new THREE.Group();
    const slideMat = new THREE.MeshStandardMaterial({ color: 0x3a3a3a, roughness: 0.5, metalness: 0.6 });
    const frameMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
    const handMat  = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 1 });

    slideMesh = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.022, 0.18), slideMat);
    slideMesh.position.set(0.1, -0.1, -0.25);
    weaponGroup.add(slideMesh);

    const rearSight = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.005, 0.01), frameMat);
    rearSight.position.set(0, 0.012, 0.08); slideMesh.add(rearSight);

    const frontSight = new THREE.Mesh(new THREE.BoxGeometry(0.006, 0.004, 0.014), frameMat);
    frontSight.position.set(0, 0.012, -0.08); slideMesh.add(frontSight);

    const frame = new THREE.Mesh(new THREE.BoxGeometry(0.025, 0.015, 0.12), frameMat);
    frame.position.set(0.1, -0.118, -0.22); weaponGroup.add(frame);

    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.023, 0.08, 0.045), frameMat);
    grip.position.set(0.1, -0.16, -0.19); grip.rotation.x = -0.25; weaponGroup.add(grip);

    const hand = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.07, 0.07), handMat);
    hand.position.set(0.1, -0.18, -0.18); weaponGroup.add(hand);

    muzzleFlash = new THREE.Mesh(
        new THREE.BoxGeometry(0.04, 0.04, 0.04),
        new THREE.MeshBasicMaterial({ color: 0x00ffff })
    );
    muzzleFlash.position.set(0.1, -0.1, -0.36);
    muzzleFlash.visible = false;
    weaponGroup.add(muzzleFlash);

    camera.add(weaponGroup);
    scene.add(camera);
}

// ═════════════════════════════════════════════════════════════════════════════
// GAME LOOP
// ═════════════════════════════════════════════════════════════════════════════

function animate() {
    requestAnimationFrame(animate);
    const delta = Math.min(clock.getDelta(), 0.05);
    const elapsed = clock.elapsedTime;

    if (isPlaying && state === 'PLAYING') {

        // ── Level timer ──
        if (level < 10) {
            levelTimer -= delta;
            if (levelTimer <= 0) {
                level++; levelEl.innerText = level;
                levelTimer = 15.0;
                if (lives < MAX_LIVES) { lives++; updateLives(); }
                levelUpAnim();
            } else {
                const t = levelTimer;
                timeEl.innerText = t.toFixed(1);
                timeEl.style.color = t < 4 ? '#ff3333' : t < 8 ? '#ffaa00' : '#fff';
                updateTimerBar(t);
            }
        } else {
            timeEl.innerText = '∞'; timeEl.style.color = '#00ffff';
        }

        // ── Update targets ──
        for (let i = targets.length - 1; i >= 0; i--) {
            const t = targets[i];
            const ud = t.userData;

            // Spawn grow-in — move immediately, just scale up
            if (ud.spawnScale < 1) {
                ud.spawnScale = Math.min(ud.spawnScale + delta * 10, 1);
                t.scale.setScalar(ud.spawnScale * ud.sizeVar);
            }

            // ── Jump / crouch impulse system ─────────────────────────────────
            ud.jumpCooldown = Math.max(0, ud.jumpCooldown - delta);
            if (ud.jumpCooldown <= 0 && ud.spawnScale >= 1) {
                const jr = Math.random();
                // jump: 12% chance, crouch: 8% chance
                if (jr < 0.12) {
                    ud.jumpVy = ud.maxSpeed * (1.8 + Math.random() * 1.2); // upward burst
                    ud.jumpCooldown = 0.8 + Math.random() * 1.2;
                } else if (jr < 0.20) {
                    ud.jumpVy = -ud.maxSpeed * (1.0 + Math.random() * 0.8); // crouch dip
                    ud.jumpCooldown = 0.5 + Math.random() * 0.8;
                } else {
                    ud.jumpCooldown = 0.3 + Math.random() * 0.5; // no action, wait
                }
            }
            // Apply jump/crouch impulse with gravity-like decay
            if (Math.abs(ud.jumpVy) > 0.0001) {
                ud.vy += ud.jumpVy * delta * 6;
                ud.jumpVy *= Math.pow(0.12, delta); // fast decay
                if (Math.abs(ud.jumpVy) < 0.001) ud.jumpVy = 0;
            }

            // Movement — snappy FPS player behaviour
            ud.jukeCooldown = Math.max(0, ud.jukeCooldown - delta);
            ud.nextBehaviourIn -= delta;

            if (ud.nextBehaviourIn <= 0) {
                const r = Math.random();

                if (ud.jukeCooldown <= 0 && r < 0.30) {
                    // Counter-strafe: instant snap to opposite direction — NO freeze
                    // Real players counter-strafe by pressing opposite key, velocity drops fast
                    ud.strafeDir *= -1;
                    ud.tvx = ud.strafeDir * ud.maxSpeed * (0.8 + Math.random() * 0.2);
                    ud.tvy = ud.vertBias * ud.maxSpeed * 0.2;
                    ud.jukeCooldown = 0.25 + Math.random() * 0.2;
                    ud.nextBehaviourIn = 0.15 + Math.random() * 0.25;

                } else if (r < 0.55) {
                    // Hard strafe — full speed horizontal
                    ud.strafeDir = Math.random() < 0.5 ? -1 : 1;
                    ud.tvx = ud.strafeDir * ud.maxSpeed * (0.85 + Math.random() * 0.15);
                    ud.tvy = ud.vertBias * ud.maxSpeed * 0.15;
                    ud.nextBehaviourIn = 0.25 + Math.random() * 0.45;

                } else if (r < 0.72) {
                    // Peek: dart toward center then snap back (common in tactical FPS)
                    ud.tvx = ud.strafeDir * ud.maxSpeed * (0.5 + Math.random() * 0.3);
                    ud.tvy = (Math.random() - 0.5) * ud.maxSpeed * 0.35;
                    ud.nextBehaviourIn = 0.12 + Math.random() * 0.18;

                } else if (r < 0.88) {
                    // Diagonal rush
                    ud.tvx = ud.strafeDir * ud.maxSpeed * (0.6 + Math.random() * 0.35);
                    ud.tvy = (Math.random() < 0.5 ? 1 : -1) * ud.maxSpeed * (0.25 + Math.random() * 0.2);
                    ud.nextBehaviourIn = 0.2 + Math.random() * 0.35;

                } else {
                    // Very brief deceleration (crouch-stop), max 0.1s — never a full stop
                    ud.tvx = ud.strafeDir * ud.maxSpeed * 0.25;
                    ud.tvy = 0;
                    ud.nextBehaviourIn = 0.06 + Math.random() * 0.08;
                }
            }

            // High accel: reaches target speed in ~2-3 frames — feels snappy, not floaty
            const accelRate = 0.35;
            ud.vx += (ud.tvx - ud.vx) * accelRate;
            ud.vy += (ud.tvy - ud.vy) * accelRate;

            t.position.x += ud.vx;
            t.position.y += ud.vy;

            // Bounce off walls and flip strafe direction (player hits a wall = turns around)
            if (t.position.x > BOUNDS.maxX) {
                t.position.x = BOUNDS.maxX;
                ud.tvx = -Math.abs(ud.tvx);
                ud.strafeDir = -1;
            }
            if (t.position.x < BOUNDS.minX) {
                t.position.x = BOUNDS.minX;
                ud.tvx = Math.abs(ud.tvx);
                ud.strafeDir = 1;
            }
            if (t.position.y > BOUNDS.maxY) { t.position.y = BOUNDS.maxY; ud.tvy = -Math.abs(ud.tvy); }
            if (t.position.y < BOUNDS.minY) { t.position.y = BOUNDS.minY; ud.tvy = Math.abs(ud.tvy); }

            // Rotation
            const rs = ud.type === 'bomb' ? 0.04 : 0.013;
            t.rotation.x += rs; t.rotation.y += rs * 0.65;

            // Emissive pulse
            const goldPulse = 1.5 + 0.5 * Math.abs(Math.sin(elapsed * 4 + ud.birthTime));
            t.material.emissiveIntensity = ud.type === 'bomb'
                ? 0.5 + 0.6 * Math.abs(Math.sin(elapsed * 9 + ud.birthTime))
                : ud.type === 'gold'
                ? goldPulse
                : 0.4 + 0.25 * Math.sin(elapsed * 2.5 + ud.birthTime);
            if (ud.pointLight) ud.pointLight.intensity = goldPulse * 1.8;

            // Shrink
            let newScale = t.scale.x;
            if (ud.spawnScale >= 1) {
                const shrunk = (t.scale.x / ud.sizeVar) - ud.shrinkRate;
                newScale = shrunk * ud.sizeVar;
                t.scale.setScalar(newScale);
            }

            // Expired
            if (newScale <= 0) {
                const type = ud.type, pos = t.position.clone();
                scene.remove(t); targets.splice(i, 1);

                if (type === 'bomb') {
                    const pts = 5 * level;
                    addScore(pts);
                    showPopup(pos, `EVITE +${pts}`, '#ff6600');
                } else if (type === 'heart') {
                    showPopup(pos, 'RATE', '#ff44aa');
                } else {
                    playSound('miss'); flashDamage(); screenShake(0.6);
                    combo = 0; updateCombo();
                    lives = Math.max(0, lives - 1); updateLives(); updateLowHealth();
                    if (lives <= 0) { gameOver(); return; }
                }
            }
        }

        // ── Fill targets ──
        const maxT = getMaxTargets();
        while (targets.length < maxT) spawnTarget();

    }

    // ── Particles ──
    for (let i = activeParticles.length - 1; i >= 0; i--) {
        const p = activeParticles[i];
        const prog = (elapsed - p.t0) / p.dur;
        if (prog >= 1) { p.frags.forEach(f => scene.remove(f.mesh)); activeParticles.splice(i, 1); continue; }
        p.frags.forEach(f => {
            f.vel.y -= 0.003; // gravity
            f.mesh.position.add(f.vel);
            f.vel.multiplyScalar(0.88);
            f.mesh.material.opacity = 1 - prog;
            f.mesh.scale.setScalar(1 - prog * 0.55);
        });
    }

    // ── FPS camera: direct 1:1 + micro-sway ──
    if (isPlaying) {
        // Apply accumulated mouse delta directly, no inertia
        camYaw   -= aimVelX;
        camPitch -= aimVelY;
        aimVelX  = 0;
        aimVelY  = 0;

        // Clamp pitch ±70°
        camPitch = Math.max(-1.22, Math.min(1.22, camPitch));

        // Micro-sway: very subtle hand tremor
        const swayAmp = 0.0006;
        camera.rotation.y = camYaw  + Math.sin(elapsed * 1.1) * Math.cos(elapsed * 0.7)  * swayAmp;
        camera.rotation.x = camPitch + Math.sin(elapsed * 0.8) * Math.cos(elapsed * 1.3) * swayAmp * 0.6;

        // Weapon bob
        bobTime += delta;
        weaponGroup.position.y = Math.sin(bobTime * 1.8) * 0.003;
        weaponGroup.position.x = Math.sin(bobTime * 0.9) * 0.0015;
    }

    // ── Weapon recoil recovery ──
    if (recoilAmount > 0) {
        weaponGroup.rotation.x = -recoilAmount;
        recoilAmount = Math.max(0, recoilAmount - delta * 1.4);
    } else {
        weaponGroup.rotation.x = 0;
    }

    // ── Debris float ──
    if (scene.userData.debris) {
        scene.userData.debris.forEach(d => {
            d.rotation.y += d.userData.rotSpeed;
            d.position.y = d.userData.baseY + Math.sin(elapsed * d.userData.floatSpeed + d.userData.floatOffset) * d.userData.floatAmp;
        });
    }

    // ── Bomb labels ──
    if (isPlaying) updateBombLabels();

    renderer.render(scene, camera);
}
</script>
